# v2 (SPDK) data engine StorageClass for dynamically-provisioned volumes.
# This is the CLUSTER DEFAULT StorageClass: no active v1 data-engine nodes remain,
# so the chart's v1 `longhorn` SC is non-functional (defaultClass:false in the
# HelmRelease). v2 volumes only attach on v2-enabled nodes — pin consumers to
# storage.longhorn-v2.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-v2
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  dataEngine: "v2"
  dataLocality: "disabled"
  fsType: "ext4"
  staleReplicaTimeout: "30"
  disableRevisionCounter: "true"
  unmapMarkSnapChainRemoved: "ignored"
