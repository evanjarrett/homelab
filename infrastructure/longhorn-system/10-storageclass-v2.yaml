# v2 (SPDK) data engine StorageClass for dynamically-provisioned volumes.
# Mirrors the default `longhorn` SC but dataEngine=v2 and numberOfReplicas=2
# (there are currently 2 v2 disks — the 2 RK1s; .163 adds a 3rd, bump to 3 later).
# v2 volumes only attach on v2-enabled nodes — pin consumers to storage.longhorn-v2.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-v2
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  dataEngine: "v2"
  dataLocality: "disabled"
  fsType: "ext4"
  staleReplicaTimeout: "30"
  disableRevisionCounter: "true"
  unmapMarkSnapChainRemoved: "ignored"
