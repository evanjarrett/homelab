apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn-helmrelease
  namespace: longhorn-system
spec:
  releaseName: longhorn
  chart:
    spec:
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn-helmrepo
        namespace: flux-system
      version: 1.12.0
  interval: 2h
  install:
    createNamespace: true
    remediation:
      retries: 3
  values:
    defaultSettings:
      createDefaultDiskLabeledNodes: true
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      storageReservedPercentageForDefaultDisk: 0
      storageMinimalAvailablePercentage: 10
      guaranteedInstanceManagerCPU: 12
      recurringJobMaxRetention: 10
      autoCleanupSnapshotWhenDeleteBackup: true
      snapshotMaxCount: 30
      # v2 (SPDK) data engine — enabled cluster-wide, but only schedules on amd64 CP nodes
      # that have hugepages (vm.nr_hugepages=1024) + uio_pci_generic loaded. arm64 nodes carry
      # node.longhorn.io/disable-v2-data-engine=true so v2 never lands there.
      # Hugepage size is the `data-engine-memory-size` setting (default {"v2":"2048"} MiB =
      # 2GiB), which already matches vm.nr_hugepages=1024 — no override needed here.
      v2DataEngine: true
      # Interrupt mode: stop the SPDK reactor busy-polling a full CPU core per v2
      # instance-manager (poll mode pins ~2 cores/IM 24/7 even when idle). MEASURED
      # 2026-06-16: total v2 IM CPU ~11.7 → ~6.0 cores; amd64 portion 6.0 → 3.0 cores
      # (~3 cores ≈ ~45W theoretical at ~15W/core; rack meter showed ~635→~614W, noisy).
      # It does NOT drop to zero — frigate (24/7 recording) + VM/vmagent/talos-logs keep
      # real I/O flowing, so the hybrid reactor still works ~1.3-1.7 cores per active IM.
      # arm64 RK1 poll cores are ~free in watts either way. Trade-off: slightly higher
      # I/O latency under load — fine for these homelab volumes.
      # NOTE: changing this requires ALL v2 volumes detached; the live Setting CR is
      # the runtime source of truth (Helm defaultSettings won't override an already-set
      # Setting CR), this value only re-seeds on a fresh install. Value is a v2 map.
      dataEngineInterruptModeEnabled: '{"v2":"true"}'
      # Scope Longhorn's system-managed components (instance-manager,
      # engine-image, CSI) to storage nodes only, so the SD-only CM4 nodes
      # (no storage.longhorn label) run no Longhorn — leaving them free for
      # other workloads without needing a node taint. Value is "key:value".
      systemManagedComponentsNodeSelector: "storage.longhorn:true"
    defaultBackupStore:
      backupTarget: "nfs://192.168.1.100:/mnt/Pool-1.18.6/longhorn"
    persistence:
      defaultClass: true
    # Run longhorn-manager only on storage nodes (NVMe). The 2 SD-only CM4
    # nodes (talos-mxt-qrp, talos-25h-4wi) lack storage.longhorn=true, so they
    # drop out of Longhorn entirely (not "disabled" — absent). Keeps Longhorn's
    # node list to the 9 real storage nodes.
    longhornManager:
      nodeSelector:
        storage.longhorn: "true"

