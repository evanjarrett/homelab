# VolumeSnapshotClass used by the app-data backup jobs to snapshot Longhorn
# volumes. type: snap = an in-cluster Longhorn snapshot (fast, no backupstore
# round-trip). The backup worker then provisions a temporary read-only clone
# PVC from the snapshot (full-copy restore — the only mode v2 supports in 1.12.0)
# and copies the real files out to NFS.
#
# NOTE: depends on the VolumeSnapshot CRDs from snapshot-controller (00-release).
# Flux retries until the CRD is established, so apply ordering self-heals.
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: longhorn-snap
driver: driver.longhorn.io
deletionPolicy: Delete
parameters:
  type: snap
