# Short-circuits app.bsky.ageassurance.getState in front of the PDS: Envoy returns a
# canned "assured / full access" response so clients never hit the (unimplemented) PDS
# endpoint. Mirrors the Caddy `handle ... respond` pattern via an Envoy direct_response
# route inserted ahead of the pds-tls-route backend on the jarrett.app vhost.
# EnvoyFilter must live in the gateway workload's namespace (same as homeassistant-mcp-cors).
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: pds-age-assurance
  namespace: gateway
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: jarrett-net
  configPatches:
    - applyTo: HTTP_ROUTE
      match:
        context: GATEWAY
        routeConfiguration:
          vhost:
            name: "jarrett.app:443"
      patch:
        operation: INSERT_FIRST
        value:
          name: pds-age-assurance-getstate
          match:
            path: "/xrpc/app.bsky.ageassurance.getState"
          direct_response:
            status: 200
            body:
              inline_string: >-
                {"state":{"lastInitiatedAt":"2026-07-18T10:25:53.000Z","status":"assured","access":"full"},"metadata":{"accountCreatedAt":"2023-06-08T21:27:50.000Z"}}
          response_headers_to_add:
            - header:
                key: content-type
                value: application/json
              append_action: OVERWRITE_IF_EXISTS_OR_ADD
            - header:
                key: access-control-allow-headers
                value: "authorization,dpop,atproto-accept-labelers,atproto-proxy"
              append_action: OVERWRITE_IF_EXISTS_OR_ADD
            - header:
                key: access-control-allow-origin
                value: "*"
              append_action: OVERWRITE_IF_EXISTS_OR_ADD
