apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-exporter-helmrelease
  namespace: monitoring
spec:
  releaseName: prometheus-node-exporter
  chart:
    spec:
      chart: prometheus-node-exporter
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-helmrepo
        namespace: flux-system
      version: 4.55.0
  interval: 2h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    # Scraped by vmagent's dedicated "node-exporter" job (service label match);
    # no prometheus.io annotations needed.
    hostNetwork: true
    hostPID: true
    hostRootFsMount:
      enabled: true
    # Land on every node, including control-plane nodes (which run workloads here).
    tolerations:
      - operator: Exists
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        memory: 64Mi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-state-metrics-helmrelease
  namespace: monitoring
spec:
  releaseName: kube-state-metrics
  chart:
    spec:
      chart: kube-state-metrics
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-helmrepo
        namespace: flux-system
      version: 7.4.1
  interval: 2h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    # Scraped by vmagent's dedicated "kube-state-metrics" job (service label match).
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
