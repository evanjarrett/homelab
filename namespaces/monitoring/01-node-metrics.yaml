apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-exporter-helmrelease
  namespace: monitoring
spec:
  releaseName: prometheus-node-exporter
  chart:
    spec:
      chart: prometheus-node-exporter
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-helmrepo
        namespace: flux-system
      version: 4.56.1
  interval: 2h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    # Scraped by vmagent's dedicated "node-exporter" job (service label match);
    # no prometheus.io annotations needed.
    hostNetwork: true
    hostPID: true
    hostRootFsMount:
      enabled: true
    # Land on every node, including control-plane nodes (which run workloads here).
    tolerations:
      - operator: Exists
    # Enable the (default-off) drm collector: exposes node_drm_gpu_busy_percent +
    # VRAM for amdgpu cards by reading /sys/class/drm. This is the only source of
    # GPU utilization for the Strix Halo APU — the AMD device-metrics-exporter
    # reports 0 for power/temp/activity on it (amdsmi can't read the APU sensors),
    # while node-exporter's hwmon collector already surfaces its power/temp/clock.
    extraArgs:
      - --collector.drm
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        memory: 64Mi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-state-metrics-helmrelease
  namespace: monitoring
spec:
  releaseName: kube-state-metrics
  chart:
    spec:
      chart: kube-state-metrics
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-helmrepo
        namespace: flux-system
      version: 8.0.0
  interval: 2h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    # Scraped by vmagent's dedicated "kube-state-metrics" job (service label match).
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
