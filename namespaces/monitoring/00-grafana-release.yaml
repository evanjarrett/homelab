apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-helmrelease
  namespace: monitoring
spec:
  releaseName: grafana
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana-community-helmrepo
        namespace: flux-system
      version: 12.8.0
  interval: 2h
  timeout: 10m
  install:
    createNamespace: true
    crds: Create
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Admin credentials from the HSM-backed secret (operator delivers it into
    # this namespace). Keys are username/password, so override the chart's
    # default admin-user/admin-password key names.
    admin:
      existingSecret: grafana-login
      userKey: username
      passwordKey: password
    deploymentStrategy:
      type: Recreate
    # Stateless: Grafana stores no metrics (those live in VictoriaMetrics).
    # Datasource, dashboards and admin are all provisioned from config/secret,
    # so an ephemeral DB rebuilds identically on every restart — no PVC to
    # manage, no orphaned dashboards.
    persistence:
      enabled: false
    # Since the DB is ephemeral, Grafana treats every restart as a fresh user and
    # re-shows the "What's new" / news prompts (that dismissal is a per-user DB
    # pref that gets wiped). Disable the whole news/analytics subsystem so the
    # prompts never appear regardless of DB state.
    grafana.ini:
      analytics:
        check_for_updates: false
        check_for_plugin_updates: false
        reporting_enabled: false
        feedback_links_enabled: false
      news:
        news_feed_enabled: false
      # The "What's new in Grafana" popup is the splash-screen modal, gated by
      # this feature toggle. Its "already seen" flag is a per-user DB pref, so the
      # ephemeral DB makes it reappear on every restart — disable it outright.
      feature_toggles:
        splashScreen: false
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: victoriametrics
            # Fixed uid (defaults to a random one). Baked dashboards reference the
            # datasource by this uid, so it must stay stable across rebuilds.
            uid: victoriametrics
            type: prometheus
            orgId: 1
            url: http://victoria-metrics-server.monitoring.svc.cluster.local:8428/
            access: proxy
            isDefault: true
            updateIntervalSeconds: 10
            editable: true

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          # false so Grafana auto-removes provisioned dashboards whose source
          # files are gone (git is the source of truth). With true, removed
          # dashboards get orphaned + locked in the DB instead of cleaned up.
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
        # Dedicated provider for the ConfigMap-mounted "baked" dashboards (those
        # the chart's URL loader can't process — see 02-grafana-baked-dashboards).
        # Must be a separate path from 'default' (which the init container
        # populates) — mounting the ConfigMap over /default would shadow it.
        - name: 'baked'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/baked

    # Mounts grafana-baked-dashboards into /var/lib/grafana/dashboards/baked,
    # read by the 'baked' provider above.
    dashboardsConfigMaps:
      baked: grafana-baked-dashboards

    dashboards:
      default:
        # VictoriaMetrics single-node (we run victoria-metrics-single, NOT the
        # cluster build — 11176 was the cluster dashboard and stayed empty).
        victoriametrics:
          gnetId: 10229
          revision: 54
          datasource: victoriametrics
        vmagent:
          gnetId: 12683
          revision: 7
          datasource: victoriametrics
        node-exporter-full:
          gnetId: 1860
          revision: 45
          datasource: victoriametrics
        # dotdc "Kubernetes / Views" set — replaces 14205, which assumed systemd
        # cgroups (Talos has none) and the kubernetes_io_hostname label we removed.
        kubernetes-global:
          gnetId: 15757
          revision: 43
          datasource: victoriametrics
        kubernetes-namespaces:
          gnetId: 15758
          revision: 46
          datasource: victoriametrics
        kubernetes-nodes:
          gnetId: 15759
          revision: 40
          datasource: victoriametrics
        kubernetes-pods:
          gnetId: 15760
          revision: 39
          datasource: victoriametrics
        coredns:
          gnetId: 15762
          revision: 22
          datasource: victoriametrics
        # NOTE: longhorn, cert-manager and the two flux dashboards are NOT here —
        # the chart's URL loader mangles their datasources, so they're baked into
        # the grafana-baked-dashboards ConfigMap (02-grafana-baked-dashboards.yaml)
        # and served via the 'baked' provider.
        # Istio. Control-plane metrics already flow (pilot_*); mesh/service/
        # workload need the istio-proxy scrape job and only render workloads that
        # have an injected sidecar.
        istio-control-plane:
          gnetId: 7645
          revision: 310
          datasource: victoriametrics
        istio-mesh:
          gnetId: 7639
          revision: 311
          datasource: victoriametrics
        # NOTE: istio-service (7636) and istio-workload (7630) are NOT here —
        # they're baked into grafana-baked-dashboards (02-grafana-baked-dashboards.yaml)
        # so the "Reporter" (qrep) variable can default to BOTH source+destination
        # (gnetId ships destination-only, which is empty on our mesh).
        # AMD GPU dashboards (vLLM workload) are also baked — see the 'baked'
        # provider / grafana-baked-dashboards ConfigMap.
