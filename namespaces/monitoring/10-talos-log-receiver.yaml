apiVersion: longhorn.io/v1beta2
kind: Volume
metadata:
  name: talos-logs-data
  namespace: longhorn-system
  labels:
    app: talos-log-receiver
spec:
  size: "5368709120"
  numberOfReplicas: 3
  frontend: blockdev
  accessMode: rwo
  dataEngine: v2
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: talos-logs-data
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn
  csi:
    driver: driver.longhorn.io
    volumeHandle: talos-logs-data
    fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: talos-logs-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  volumeName: talos-logs-data
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: talos-log-receiver-config
  namespace: monitoring
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf

    [INPUT]
        Name          tcp
        Listen        0.0.0.0
        Port          5170
        Format        json
        Tag           talos

    [OUTPUT]
        Name          file
        Match         talos
        Path          /logs
        File          talos.log
        Mkdir         true

  parsers.conf: |
    # Talos ships JSON-lines natively; the tcp input parses it directly.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talos-log-receiver
  namespace: monitoring
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: talos-log-receiver
  template:
    metadata:
      labels:
        app: talos-log-receiver
    spec:
      # Pin to storage nodes — uses a Longhorn volume; CM4 nodes have no Longhorn CSI.
      nodeSelector:
        storage.longhorn-v2: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:5.0.8
          args:
            - "-c"
            - "/fluent-bit/etc/fluent-bit.conf"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: tcp-json
              containerPort: 5170
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 5170
            initialDelaySeconds: 5
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc
            - name: logs
              mountPath: /logs
        # fluent-bit image is distroless; sidecar gives a shell + tools (jq, tail, grep)
        # for kubectl exec -c shell -- to read /logs/talos.log directly.
        # It also rotates the log: out_file has NO size cap, so without this the
        # 5Gi volume fills, ext4 flips read-only, and log shipping silently dies
        # (happened Jun 2026 — lost the kernel logs for a CM4 crash). The loop keeps
        # talos.log as a ~1 GiB ring buffer (truncate-in-place preserves the inode so
        # fluent-bit's O_APPEND writes keep working). Emergency branch self-heals a
        # near-full volume by hard-truncating when there's no room for a safe rotate.
        - name: shell
          image: docker.io/library/busybox:1.38
          command:
            - /bin/sh
            - -c
            - |
              LOG=/logs/talos.log
              while true; do
                used=$(df -P /logs | awk 'NR==2{print $5+0}')
                sz=$(wc -c < "$LOG" 2>/dev/null || echo 0)
                if [ "$used" -ge 90 ]; then
                  : > "$LOG"                       # near-full: hard reset to free space
                elif [ "$sz" -gt 3221225472 ]; then # >3 GiB: keep last 1 GiB
                  tail -c 1073741824 "$LOG" > /logs/.rot && cat /logs/.rot > "$LOG"
                  rm -f /logs/.rot
                fi
                sleep 30
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - name: logs
              mountPath: /logs
      volumes:
        - name: config
          configMap:
            name: talos-log-receiver-config
        - name: logs
          persistentVolumeClaim:
            claimName: talos-logs-data
---
apiVersion: v1
kind: Service
metadata:
  name: talos-log-receiver
  namespace: monitoring
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.3.3
spec:
  type: LoadBalancer
  # Cluster (not Local): Talos ships logs from the host network to the MetalLB
  # VIP. With eTP:Local only the pod's node announces/serves the VIP, which left
  # several nodes unable to reach it (stuck SYN_SENT). Cluster lets any node
  # serve and forward via kube-proxy. Source IP isn't used by the receiver.
  externalTrafficPolicy: Cluster
  selector:
    app: talos-log-receiver
  ports:
    - name: tcp-json
      protocol: TCP
      port: 5170
      targetPort: 5170
