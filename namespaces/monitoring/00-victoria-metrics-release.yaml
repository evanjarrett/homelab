apiVersion: longhorn.io/v1beta2
kind: Volume
metadata:
  name: victoria-metrics-data
  namespace: longhorn-system
  labels:
    app: victoria-metrics
spec:
  size: "8589934592"
  numberOfReplicas: 3
  frontend: blockdev
  accessMode: rwo
  dataEngine: v2
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: victoria-metrics-data
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn
  csi:
    driver: driver.longhorn.io
    volumeHandle: victoria-metrics-data
    fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-metrics-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  volumeName: victoria-metrics-data
  resources:
    requests:
      storage: 8Gi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-helmrelease
  namespace: monitoring
spec:
  releaseName: victoria-metrics
  chart:
    spec:
      chart: victoria-metrics-single
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics-helmrepo
        namespace: flux-system
  interval: 2h
  install:
    createNamespace: true
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    fullnameOverride: victoria-metrics
    server:
      # Pin to v2-data-engine-capable nodes (v2 volumes only attach where a v2
      # instance-manager runs). storage.longhorn-v2 = the 3 amd64 CP + 2 RK1.
      nodeSelector:
        storage.longhorn-v2: "true"
      mode: deployment
      # Safety net: NFD/Talos node labels + pod labels can push series past the
      # default 40-label cap, which makes VM silently drop the whole sample
      # (reason="too_many_labels"). Combined with the labelmap trims below.
      extraArgs:
        maxLabelsPerTimeseries: "60"
      strategy:
        type: Recreate
      persistentVolume:
        enabled: true
        existingClaim: victoria-metrics-data
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8428"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-agent-helmrelease
  namespace: monitoring
spec:
  releaseName: victoria-metrics-agent
  chart:
    spec:
      chart: victoria-metrics-agent
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics-helmrepo
        namespace: flux-system
      version: 0.41.1
  interval: 2h
  install:
    createNamespace: true
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    replicaCount: 3
    mode: statefulSet
    # Pin to v2-data-engine-capable nodes (v2 volumes only attach where a v2
    # instance-manager runs). storage.longhorn-v2 = the 3 amd64 CP + 2 RK1.
    nodeSelector:
      storage.longhorn-v2: "true"
    statefulSet:
      clusterMode: true
    rbac:
      extraRules:
        - apiGroups: [""]
          resources: ["nodes/proxy"]
          verbs: ["get", "list", "watch"]
    persistentVolume:
      enabled: true
      size: 2Gi
      storageClassName: longhorn-v2
    resources:
      requests:
        cpu: 50m
        memory: 512Mi
      limits:
        memory: 1Gi
    remoteWrite:
      - url: http://victoria-metrics-server.monitoring.svc.cluster.local:8428/api/v1/write
    config:
      global:
        scrape_interval: 30s
        # Added so dashboards that key off a cluster label (e.g. the dotdc
        # "Kubernetes / Views" set) populate their $cluster variable. Applied
        # to every scraped series before remote write.
        external_labels:
          cluster: homelab
      scrape_configs:
        - job_name: vmagent
          static_configs:
            - targets: ["localhost:8429"]
        - job_name: "kubernetes-apiservers"
          kubernetes_sd_configs:
            - role: endpoints
          scheme: https
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          relabel_configs:
            - source_labels:
                [
                  __meta_kubernetes_namespace,
                  __meta_kubernetes_service_name,
                  __meta_kubernetes_endpoint_port_name,
                ]
              action: keep
              regex: default;kubernetes;https
        - job_name: "kubernetes-nodes"
          scheme: https
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            # NOTE: do NOT labelmap __meta_kubernetes_node_label_(.+) here — it
            # copies every NFD/Talos node label (~24) onto each series, blowing
            # past VM's per-series label cap. `instance` is set to the node name
            # by service discovery, so node identity is preserved without it.
            - target_label: __address__
              replacement: kubernetes.default.svc:443
            - source_labels: [__meta_kubernetes_node_name]
              regex: (.+)
              target_label: __metrics_path__
              replacement: /api/v1/nodes/$1/proxy/metrics
        - job_name: "kubernetes-nodes-cadvisor"
          scheme: https
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            # See note on the kubernetes-nodes job: the node labelmap is omitted
            # on purpose. cAdvisor series already carry pod/container/namespace
            # labels, so adding ~24 node labels on top reliably exceeds the cap
            # and was silently dropping every container series on label-heavy
            # nodes (control-plane, GPU nodes).
            - target_label: __address__
              replacement: kubernetes.default.svc:443
            - source_labels: [__meta_kubernetes_node_name]
              regex: (.+)
              target_label: __metrics_path__
              replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
          metric_relabel_configs:
            - action: replace
              source_labels: [pod]
              regex: '(.+)'
              target_label: pod_name
              replacement: '${1}'
            - action: replace
              source_labels: [container]
              regex: '(.+)'
              target_label: container_name
              replacement: '${1}'
            - action: replace
              target_label: name
              replacement: k8s_stub
            - action: replace
              source_labels: [id]
              regex: '^/system\.slice/(.+)\.service$'
              target_label: systemd_service_name
              replacement: '${1}'
        - job_name: "kubernetes-service-endpoints"
          kubernetes_sd_configs:
            - role: endpoints
          relabel_configs:
            - action: drop
              source_labels: [__meta_kubernetes_pod_container_init]
              regex: true
            - action: keep_if_equal
              source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_container_port_number]
            - source_labels:
                [__meta_kubernetes_service_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels:
                [__meta_kubernetes_service_annotation_prometheus_io_scheme]
              action: replace
              target_label: __scheme__
              regex: (https?)
            - source_labels:
                [__meta_kubernetes_service_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels:
                [
                  __address__,
                  __meta_kubernetes_service_annotation_prometheus_io_port,
                ]
              action: replace
              target_label: __address__
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
            - action: labelmap
              regex: __meta_kubernetes_service_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: kubernetes_namespace
            - source_labels: [__meta_kubernetes_service_name]
              action: replace
              target_label: kubernetes_name
            - source_labels: [__meta_kubernetes_pod_node_name]
              action: replace
              target_label: kubernetes_node
        - job_name: "kubernetes-service-endpoints-slow"
          scrape_interval: 5m
          scrape_timeout: 30s
          kubernetes_sd_configs:
            - role: endpoints
          relabel_configs:
            - action: drop
              source_labels: [__meta_kubernetes_pod_container_init]
              regex: true
            - action: keep_if_equal
              source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_container_port_number]
            - source_labels:
                [__meta_kubernetes_service_annotation_prometheus_io_scrape_slow]
              action: keep
              regex: true
            - source_labels:
                [__meta_kubernetes_service_annotation_prometheus_io_scheme]
              action: replace
              target_label: __scheme__
              regex: (https?)
            - source_labels:
                [__meta_kubernetes_service_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels:
                [
                  __address__,
                  __meta_kubernetes_service_annotation_prometheus_io_port,
                ]
              action: replace
              target_label: __address__
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
            - action: labelmap
              regex: __meta_kubernetes_service_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: kubernetes_namespace
            - source_labels: [__meta_kubernetes_service_name]
              action: replace
              target_label: kubernetes_name
            - source_labels: [__meta_kubernetes_pod_node_name]
              action: replace
              target_label: kubernetes_node
        - job_name: "kubernetes-services"
          metrics_path: /probe
          params:
            module: [http_2xx]
          kubernetes_sd_configs:
            - role: service
          relabel_configs:
            - source_labels:
                [__meta_kubernetes_service_annotation_prometheus_io_probe]
              action: keep
              regex: true
            - source_labels: [__address__]
              target_label: __param_target
            - target_label: __address__
              replacement: blackbox
            - source_labels: [__param_target]
              target_label: instance
            - action: labelmap
              regex: __meta_kubernetes_service_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              target_label: kubernetes_namespace
            - source_labels: [__meta_kubernetes_service_name]
              target_label: kubernetes_name
        - job_name: "amd-gpu-exporter"
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names: ["kube-system"]
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name]
              regex: default-metrics-exporter
              action: keep
          # The official AMD GPU dashboard keys its whole variable chain on
          # cluster_name + gpu_uuid, but this exporter (default config) emits
          # neither. Synthesize them so the dashboard's selectors resolve:
          # cluster_name -> "homelab"; gpu_uuid -> "<hostname>-<gpu_id>" (unique
          # per physical GPU). hostname/gpu_id are already emitted by the exporter.
          metric_relabel_configs:
            - target_label: cluster_name
              replacement: homelab
            - source_labels: [hostname, gpu_id]
              separator: "-"
              target_label: gpu_uuid
        - job_name: "kubernetes-pods"
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - action: drop
              source_labels: [__meta_kubernetes_pod_container_init]
              regex: true
            - action: keep_if_equal
              source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_container_port_number]
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels:
                [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: kubernetes_namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: kubernetes_pod_name
        - job_name: "node-exporter"
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names: ["monitoring"]
          relabel_configs:
            - source_labels:
                [__meta_kubernetes_service_label_app_kubernetes_io_name]
              regex: prometheus-node-exporter
              action: keep
            # Pin instance/node to the node name so cluster aggregates and
            # per-node dashboards group cleanly.
            - source_labels: [__meta_kubernetes_pod_node_name]
              target_label: node
            - source_labels: [__meta_kubernetes_pod_node_name]
              target_label: instance
        - job_name: "kube-state-metrics"
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names: ["monitoring"]
          relabel_configs:
            - source_labels:
                [__meta_kubernetes_service_label_app_kubernetes_io_name]
              regex: kube-state-metrics
              action: keep
        # Longhorn manager exposes volume/replica/capacity metrics on the
        # longhorn-backend service :9500. Powers the Longhorn dashboard — the
        # most important one here since all cluster storage lives on Longhorn.
        - job_name: "longhorn"
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names: ["longhorn-system"]
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name]
              regex: longhorn-backend
              action: keep
        # Flux controllers serve gotk_* reconcile metrics on container port 8080
        # (named http-prom). No metrics Service exists, so discover via pods.
        - job_name: "flux"
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names: ["flux-system"]
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_container_port_name]
              regex: http-prom
              action: keep
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: replace
              target_label: app
        # cert-manager controller/cainjector/webhook all expose metrics on :9402
        # (the 443 webhook port is excluded by the address match). Cert expiry +
        # renewal failure visibility.
        - job_name: "cert-manager"
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names: ["cert-manager"]
          relabel_configs:
            - source_labels: [__address__]
              regex: ".+:9402"
              action: keep
        # CoreDNS (kube-dns service) metrics on :9153.
        - job_name: "coredns"
          kubernetes_sd_configs:
            - role: endpoints
              namespaces:
                names: ["kube-system"]
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_name]
              regex: kube-dns
              action: keep
            - source_labels: [__address__]
              regex: ".+:9153"
              action: keep
        # Istio envoy sidecars expose merged app+proxy telemetry on the istio
        # agent at :15020 /stats/prometheus. Keyed on the http-envoy-prom port so
        # each sidecar yields exactly one target (no duplicate scrapes), then the
        # address is rewritten to 15020. istiod control-plane metrics already flow
        # via the pods job, so only the mesh/envoy side is added here. Cardinality
        # is low today (few injected sidecars); watch vm_rows_ignored_total and
        # series count if mesh injection grows.
        - job_name: "istio-proxy"
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels:
                [__meta_kubernetes_pod_container_name, __meta_kubernetes_pod_container_port_name]
              regex: istio-proxy;http-envoy-prom
              action: keep
            - source_labels: [__address__]
              action: replace
              regex: ([^:]+)(?::\d+)?
              replacement: $1:15020
              target_label: __address__
            - target_label: __metrics_path__
              replacement: /stats/prometheus
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod
          # Keep only the istio_* mesh metrics the dashboards use. /stats/prometheus
          # also emits raw envoy_* stats (high cardinality, and they carry their own
          # cluster_name like "xds-grpc" which otherwise pollutes dashboard cluster
          # variables). istiod control-plane metrics (pilot_*) come from a different
          # target, so dropping non-istio_* here loses nothing the dashboards need.
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: "istio_.*"
              action: keep
