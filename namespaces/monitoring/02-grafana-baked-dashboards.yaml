# Dashboards baked with EVERY datasource ref hardcoded to the
# 'victoriametrics' datasource (fixed uid of the same name). The grafana
# chart's URL loader rewrites datasources with a naive sed that only
# matches single-line refs, so it mangles pretty-printed / nested-ds
# dashboards (Longhorn, Flux) and can't fix a dashboard whose
# datasource variable filters our ds out (cert-manager: regex /k8s.*/).
# Also baked: istio-service/istio-workload, so the "Reporter" (qrep) variable
# can default to BOTH source+destination (gnetId ships destination-only, empty
# on our mesh). Loaded via the 'baked' provider. Regenerate with /tmp/bake.py.
#
# amd-gpu.json is HAND-AUTHORED (not from bake.py), tailored to the Strix Halo
# APU on talos-8yl-cms. The official ROCm dashboards (7-series Instinct) don't
# fit: that exporter (AMD device-metrics-exporter) reports 0 for power/temp/
# activity on the APU and emits no card_model label. This dashboard instead
# reads utilization from node-exporter's drm collector (node_drm_gpu_busy_percent),
# power/temp/clock from node-exporter hwmon (amdgpu chip), VRAM/health from the
# device-metrics-exporter. Do NOT let a bake.py regen overwrite it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-baked-dashboards
  namespace: monitoring
