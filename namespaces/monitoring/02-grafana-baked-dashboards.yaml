# Dashboards baked with datasource placeholders resolved to the
# 'victoriametrics' datasource (which has a fixed uid of the same name,
# so both name- and uid-form refs resolve). The grafana chart's URL
# loader rewrites datasources with a naive sed that only matches single-
# line refs, so it mangles pretty-printed / nested-datasource dashboards
# (AMD GPU, Longhorn, Flux) and can't fix one pinned to a stale ds name
# (cert-manager -> k8s-qa). Loaded via the 'baked' provider.
# Regenerate with /tmp/bake.py if upstream revisions change.
