apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    # node-exporter runs as a DaemonSet with hostNetwork/hostPID and host mounts,
    # which the cluster-default "baseline" PodSecurity level forbids. Same pattern
    # as longhorn-system. Grafana/VictoriaMetrics also live here.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
