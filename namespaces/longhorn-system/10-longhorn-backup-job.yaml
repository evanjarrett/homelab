# DISARMED 2026-06-28 — Longhorn #13331 incident.
# These RecurringJobs targeted groups:[default] = EVERY attached v2 volume, with
# concurrency:3. The 02:00 burst rapid-snapshots a dozen attached v2 volumes on
# whichever node holds the most (talos-gjw-4r3, ~14 of ~20), which trips
# longhorn/longhorn#13331: dmsetup suspend fails -> ext4 remounts emergency_ro ->
# apps die (pds/larapaper/victoria-metrics all wedged 2026-06-28 overnight).
# Node reboots only RECOVER the wedge, they don't prevent it (gjw-4r3 had already
# been rebooted multiple times and still re-wedged). Root fix is to NOT snapshot
# attached v2 volumes in a rapid group burst.
# Re-point from group `default` to `none` (a group no volume carries) so the jobs
# stay defined+valid but match zero volumes. DO NOT restore `default` until #13331
# is fixed in a 1.12.x. See backup-architecture memory.
#
# INCOMPLETE-DISARM FIX 2026-07-23 — the `groups:[none]` disarm above does NOT
# cover the `system-backup` task: a Longhorn *system backup* snapshots EVERY volume
# regardless of `groups`. It kept firing at 02:30 nightly (SystemBackup CRs + a
# `snap-system-backup-*` snapshot on every v2 volume in a ~70s burst on gjw-4r3),
# re-triggering the exact #13331 emergency_ro wedge — this is what silently bricked
# atproto-pds + headscale-router-state + talos-logs-data read-only (found 2026-07-23).
# Fix: keep the scheduled system-backup (it still captures Longhorn CR/config for DR)
# but set parameters.volume-backup-policy=disabled so it NO LONGER snapshots volumes.
# The 20-ro-mount-watchdog.yaml CronJob is the safety net for any residual wedge
# (node loss, manual snapshot, etc.).
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: nightly-backup
  namespace: longhorn-system
spec:
  cron: "0 2 * * *"  # Daily at 2 AM
  task: backup
  retain: 10
  concurrency: 3
  groups:
    - none  # was: default — disarmed, see header (#13331)
  labels:
    app: longhorn-backup
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: system-backup
  namespace: longhorn-system
spec:
  cron: "30 2 * * *"  # Daily at 2:30 AM
  task: system-backup
  retain: 3
  concurrency: 3
  # system-backup IGNORES `groups`, so the group:none disarm doesn't stop it.
  # volume-backup-policy=disabled = capture Longhorn CR/config only, snapshot NO
  # volumes -> no #13331 storm. See header (2026-07-23).
  parameters:
    volume-backup-policy: disabled
  groups:
    - none  # cosmetic for system-backup (ignored); real fix is parameters above
  labels:
    app: longhorn-backup
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot-delete
  namespace: longhorn-system
spec:
  cron: "0 3 * * *"  # Daily at 3 AM (after backups)
  task: snapshot-delete
  retain: 10
  concurrency: 3
  groups:
    - none  # was: default — disarmed, see header (#13331)
  labels:
    app: longhorn-cleanup