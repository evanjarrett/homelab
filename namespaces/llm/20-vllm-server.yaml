apiVersion: longhorn.io/v1beta2
kind: Volume
metadata:
  name: vllm-models
  namespace: longhorn-system
  labels:
    app: vllm-server
spec:
  size: "107374182400"
  numberOfReplicas: 1
  frontend: blockdev
  accessMode: rwo
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vllm-models
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn
  csi:
    driver: driver.longhorn.io
    volumeHandle: vllm-models
    fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
  namespace: llm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  volumeName: vllm-models
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: llm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      nodeSelector:
        gpu.intel.com/device-id.0300-e212.present: "true"
      containers:
        - name: vllm-server
          image: intel/vllm:0.14.1-xpu
          imagePullPolicy: Always
          command: ["vllm"]
          args:
            - "serve"
            - "google/gemma-4-E4B-it"
            - "--device=xpu"
            - "--dtype=float16"
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--max-model-len=16384"
            - "--gpu-memory-utilization=0.9"
            - "--enforce-eager"
            - "--served-model-name=gemma-4-e4b"
            - "--trust-remote-code"
          env:
            - name: HF_HOME
              value: "/models"
            - name: ZES_ENABLE_SYSMAN
              value: "1"
            - name: SYCL_CACHE_PERSISTENT
              value: "1"
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: "spawn"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
              gpu.intel.com/xe: "1"
            limits:
              cpu: "8"
              memory: "16Gi"
              gpu.intel.com/xe: "1"
          securityContext:
            privileged: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 180
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 1800
            periodSeconds: 30
            failureThreshold: 6
          volumeMounts:
            - name: models
              mountPath: /models
            - name: dri
              mountPath: /dev/dri
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
        - name: dri
          hostPath:
            path: /dev/dri
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-server
  namespace: llm
spec:
  selector:
    app: vllm-server
  ports:
    - port: 8000
      targetPort: 8000
      name: http
