apiVersion: v1
kind: PersistentVolume
metadata:
  name: llama-models
spec:
  capacity:
    storage: 500Gi          # nominal; NFS ignores this
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""      # static binding, no provisioner
  mountOptions:
    - nfsvers=4.1
    - hard
    - nconnect=8            # parallel TCP streams to saturate the 2.5GbE link
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: llama-models-nfs
    volumeAttributes:
      server: "192.168.1.100"
      share: /mnt/Pool-1.18.6/kubernetes/llama-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llama-models
  namespace: llm
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: llama-models
  resources:
    requests:
      storage: 500Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-server
  namespace: llm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llama-server
  template:
    metadata:
      labels:
        app: llama-server
    spec:
      nodeSelector:
        feature.node.kubernetes.io/custom-amd.gpu: "true"
      initContainers:
        - name: download-models
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              apk add --no-cache curl
              cd /models
              BASE="https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF/resolve/main"
              # Primary model: Qwen3.6-35B-A3B — MoE (35B/3B-active), multimodal,
              # 262K native ctx via hybrid Gated-DeltaNet linear attention.
              # Replaces qwen3-vl-8b (vision) + qwen3-coder-30b (coding) + gemma-4-31b.
              if [ ! -f "Qwen3.6-35B-A3B-UD-Q6_K.gguf" ]; then
                echo "Downloading Qwen3.6-35B-A3B UD-Q6_K..."
                curl -L -# -o Qwen3.6-35B-A3B-UD-Q6_K.gguf "$BASE/Qwen3.6-35B-A3B-UD-Q6_K.gguf"
              fi
              # Vision projector (mmproj) — required for Frigate image analysis.
              if [ ! -f "mmproj-Qwen3.6-35B-A3B-F16.gguf" ]; then
                echo "Downloading Qwen3.6 mmproj..."
                curl -L -# -o mmproj-Qwen3.6-35B-A3B-F16.gguf "$BASE/mmproj-F16.gguf"
              fi
              echo "Models ready."
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: llama-server
          image: docker.io/kyuz0/amd-strix-halo-toolboxes:vulkan-radv
          imagePullPolicy: Always
          command: ["llama-server"]
          args:
            - "--model"
            - "/models/Qwen3.6-35B-A3B-UD-Q6_K.gguf"
            - "--mmproj"
            - "/models/mmproj-Qwen3.6-35B-A3B-F16.gguf"
            - "--alias"
            - "qwen3.6-35b"             # model id clients reference (Frigate, git-summarizer, Sure, agent)
            - "-ngl"
            - "999"                     # offload all layers to GPU
            - "-fa"
            - "on"                      # flash attention
            - "--jinja"                 # parse model template -> OpenAI tool_calls (Sure / HA Assist / agent)
            - "--reasoning"             # default thinking OFF: snappy + non-empty for Frigate/HA/Sure/git-sum.
            - "off"                     #   agent/coding opt back in per-request with chat_template_kwargs enable_thinking:true
            - "-c"
            - "1048576"                 # total KV budget = 4 slots x 262144 native ctx
            - "-np"
            - "4"                       # 4 server slots (Frigate bg + agent + interactive + spare)
            - "--no-kv-unified"         # private per-slot KV: each hard-capped at native 262K
            - "--slot-prompt-similarity"  # send each request to the slot whose cached prompt matches
            - "0.5"                       #   best -> agent turns reuse their warm slot; Frigate's
            - "--cache-reuse"             #   (dissimilar) vision prompts land elsewhere, not evicting it.
            - "256"                       # also reuse KV across small mid-prompt diffs via shifting.
            - "-t"                      #   -> no >262K extrapolation, no cross-slot context hogging
            - "16"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--metrics"
          env: []
          # Model load from NFS + 1M-token KV alloc takes ~2min; gate traffic until /health is green.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 60        # up to ~10min before giving up
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: "8"
            limits:
              cpu: "16"
              amd.com/gpu: 1
          securityContext:
            privileged: true
          volumeMounts:
            - name: models
              mountPath: /models
            - name: models
              mountPath: /cache
              subPath: cache
            - name: dri
              mountPath: /dev/dri
            - name: kfd
              mountPath: /dev/kfd
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llama-models
        - name: dri
          hostPath:
            path: /dev/dri
        - name: kfd
          hostPath:
            path: /dev/kfd
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
---
apiVersion: v1
kind: Service
metadata:
  name: llama-server
  namespace: llm
spec:
  selector:
    app: llama-server
  ports:
    - port: 8080
      targetPort: 8080
      name: http
