# Letta Code in embedded local-backend mode (no Letta Cloud, no Postgres).
#
#   - Agent reasoning -> qwen3.6-35b via the in-cluster llama.cpp Service
#     (cross-namespace: llama-server.llm.svc — allowed by an ingress NetworkPolicy
#     added in namespaces/llm/10-network-policy.yaml).
#   - State + memory (memfs git repos) live on the longhorn-v2 PVC at /data.
#
# No official letta-code container exists, so we run the stock upstream node:22
# image and `npm i -g @letta-ai/letta-code` once into the PVC (compiles node-pty
# natively; node:22 ships python3+make+g++). Subsequent restarts reuse the PVC
# copy, so this is not reinstalled every boot.
#
# The app-server listens on LOOPBACK only (no auth needed for a loopback listener),
# so there is intentionally no Service. Reach it from your workstation with:
#   kubectl -n agent port-forward deploy/letta-code 4500:4500
# then drive it with the Agent SDK (backend: "remote", url ws://localhost:4500),
# or get the CLI experience directly in the pod:
#   kubectl -n agent exec -it deploy/letta-code -- \
#     env PATH=/data/.npm-global/bin:$PATH letta --backend local -m llama-cpp/qwen3.6-35b
#
# To expose it in-cluster later: switch --listen to ws://0.0.0.0:4500, add
# --ws-auth capability-token (token via `kubectl hsm`), and add a Service.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: letta-code-data
  namespace: agent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-v2
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: letta-code
  namespace: agent
spec:
  replicas: 1
  # Local backend = single writer on an RWO volume -> never two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: letta-code
  template:
    metadata:
      labels:
        app: letta-code
    spec:
      # v2 (SPDK) volumes only attach where a v2 instance-manager runs.
      nodeSelector:
        storage.longhorn-v2: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000          # `node` user in the node:22 image
        runAsGroup: 1000
        fsGroup: 1000            # chown the Longhorn volume to `node`
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: letta-code
          image: node:22
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: LETTA_CODE_VERSION
              value: "0.27.17"
            - name: HOME
              value: /data
            - name: LETTA_LOCAL_BACKEND_DIR
              value: /data/lc-local-backend
            - name: LLAMA_BASE_URL
              value: "http://llama-server.llm.svc.cluster.local:8080/v1"
          command: ["/bin/sh", "-ec"]
          args:
            - |
              export PATH=/data/.npm-global/bin:$PATH
              export npm_config_prefix=/data/.npm-global
              mkdir -p /data/.npm-global /data/lc-local-backend
              if ! command -v letta >/dev/null 2>&1; then
                echo "[init] installing @letta-ai/letta-code@${LETTA_CODE_VERSION}"
                npm install -g "@letta-ai/letta-code@${LETTA_CODE_VERSION}"
              else
                echo "[init] letta present: $(letta --version)"
              fi
              letta backend local || true
              # (re)register the in-cluster llama.cpp provider (idempotent)
              letta connect llama-cpp --base-url "${LLAMA_BASE_URL}" || true
              echo "[init] starting app-server on 127.0.0.1:4500"
              exec letta app-server --backend local --listen ws://127.0.0.1:4500
          ports:
            - name: ws
              containerPort: 4500   # loopback-only; for `kubectl port-forward`
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi           # npm/native build + node runtime
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: letta-code-data
