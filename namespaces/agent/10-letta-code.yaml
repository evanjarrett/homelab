# Letta Code in embedded local-backend mode (no Letta Cloud, no Postgres).
#
#   - Agent reasoning -> qwen3.6-35b via the in-cluster llama.cpp Service
#     (cross-namespace: llama-server.llm.svc — allowed by an ingress NetworkPolicy
#     added in namespaces/llm/10-network-policy.yaml).
#   - State + memory (memfs git repos) live on the longhorn-v2 PVC at /data.
#
# No official letta-code container exists, so we build our own (see the Dockerfile
# kept alongside this POC) and push it to atcr.io/evan.jarrett.net/letta-code.
#
# The app-server listens on 0.0.0.0:4500 with a capability-token (required for a
# non-loopback listener) and is fronted by a ClusterIP Service (letta-code:4500).
# In-cluster clients (e.g. a Discord bot) reach it at
#   ws://letta-code.agent.svc.cluster.local:4500
# passing the token (Agent SDK authToken / LETTA_APP_SERVER_TOKEN). The token is
# the `token` key of the HSM-synced `letta-ws-token` secret.
# Off-cluster (LAN) clients use the internal-only Istio route at
#   wss://agent.j5t.io   (see 20-httproute.yaml; *.j5t.io is split-horizon DNS)
# also passing the token. No port-forward needed.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: letta-code-data
  namespace: agent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-v2
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: letta-code
  namespace: agent
spec:
  replicas: 1
  # Local backend = single writer on an RWO volume -> never two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: letta-code
  template:
    metadata:
      labels:
        app: letta-code
    spec:
      # v2 (SPDK) volumes only attach where a v2 instance-manager runs.
      nodeSelector:
        storage.longhorn-v2: "true"
      # Read-only, namespace-local view (30-rbac.yaml) so Jett can kubectl-explore
      # its own namespace.
      serviceAccountName: jett
      imagePullSecrets:
        - name: atcr-login       # synced into this ns by the HSM operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000          # `node` user in the image
        runAsGroup: 1000
        fsGroup: 1000            # chown the Longhorn volume to `node`
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: letta-code
          image: atcr.io/evan.jarrett.net/letta-code:0.27.17-tools.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: HOME
              value: /data
            - name: LETTA_LOCAL_BACKEND_DIR
              value: /data/lc-local-backend
            - name: LLAMA_BASE_URL
              value: "http://llama-server.llm.svc.cluster.local:8080/v1"
          command: ["/bin/sh", "-ec"]
          args:
            - |
              letta backend local || true
              # (re)register the in-cluster llama.cpp provider (idempotent)
              letta connect llama-cpp --base-url "${LLAMA_BASE_URL}" || true
              echo "[init] starting app-server on 0.0.0.0:4500 (capability-token auth)"
              exec letta app-server --backend local \
                --listen ws://0.0.0.0:4500 \
                --ws-auth capability-token \
                --ws-token-file /etc/letta/token
          ports:
            - name: ws
              containerPort: 4500
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi           # npm/native build + node runtime
          volumeMounts:
            - name: data
              mountPath: /data
            - name: ws-token
              mountPath: /etc/letta
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: letta-code-data
        - name: ws-token
          secret:
            secretName: letta-ws-token
            items:
              - key: token
                path: token
---
apiVersion: v1
kind: Service
metadata:
  name: letta-code
  namespace: agent
spec:
  selector:
    app: letta-code
  ports:
    - name: ws
      port: 4500
      targetPort: ws
