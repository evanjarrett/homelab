apiVersion: v1
kind: Namespace
metadata:
  name: agent
  labels:
    # letta-code runs as the non-root `node` user (uid 1000), drops all caps,
    # RuntimeDefault seccomp -> restricted is satisfied.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
