apiVersion: v1
kind: Namespace
metadata:
  name: headscale
  labels:
    # The subnet-router pod needs NET_ADMIN + /dev/net/tun (kernel WireGuard),
    # so the namespace runs under the privileged PSA, same as wireguard.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
