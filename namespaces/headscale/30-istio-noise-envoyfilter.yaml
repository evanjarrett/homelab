# Tailscale uses two custom HTTP upgrades that Envoy strips unless registered:
#   - tailscale-control-protocol (TS2021/Noise): POST /ts2021 for registration;
#     stripped -> clients get 403 on /ts2021 and can't register.
#   - DERP: GET /derp for the embedded relay (the fallback that survives
#     UDP-blocking networks); stripped -> headscale returns 426 and the relay
#     never connects.
# Register both upgrade types on the jarrett-net gateway's HTTP connection
# manager so they pass through to headscale. Scoped to the gateway workload.
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: headscale-noise-upgrade
  namespace: gateway
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: jarrett-net
  configPatches:
    - applyTo: NETWORK_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
      patch:
        operation: MERGE
        value:
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
            upgrade_configs:
              - upgrade_type: tailscale-control-protocol
              - upgrade_type: derp
