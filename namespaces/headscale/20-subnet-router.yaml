---
# Small persistent volume so the tailnet node identity survives restarts
# (avoids re-registering / node churn on every reschedule). Longhorn v2.
apiVersion: longhorn.io/v1beta2
kind: Volume
metadata:
  name: pvc-headscale-router-state
  namespace: longhorn-system
spec:
  size: "268435456"
  numberOfReplicas: 3
  frontend: blockdev
  accessMode: rwo
  dataLocality: disabled
  dataEngine: v2
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pvc-headscale-router-state
spec:
  capacity:
    storage: 256Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn
  csi:
    driver: driver.longhorn.io
    volumeHandle: pvc-headscale-router-state
    fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: headscale-router-state-claim
  namespace: headscale
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
  volumeName: pvc-headscale-router-state
---
# Tailscale node running as a subnet router: advertises 192.168.0.0/22 into the
# tailnet so roaming clients reach the whole LAN. We already proved a pod on
# this cluster can reach 192.168.0.1, so the kernel-mode router + its own
# masquerade forwards tailnet traffic onto the LAN.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale-subnet-router
  namespace: headscale
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headscale-subnet-router
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headscale-subnet-router
    spec:
      nodeSelector:
        storage.longhorn-v2: "true"
      containers:
        - name: tailscale
          # Pin to a specific release before going to prod (e.g. v1.86.x).
          image: ghcr.io/tailscale/tailscale:stable
          imagePullPolicy: IfNotPresent
          env:
            # Reusable pre-auth key minted on headscale, synced here via HSM.
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: headscale
                  key: TS_AUTHKEY
            # --accept-routes so this router can reach back to subnets advertised
            # by other nodes (e.g. the GL-MT3000 travel router's 192.168.8.0/24),
            # making downstream-device-to-home (site-to-site) routing work.
            - name: TS_EXTRA_ARGS
              value: "--login-server=https://headscale.jarrett.net --accept-routes"
            # Sourced from the HSM secret (set the TS_ROUTES key alongside
            # TS_AUTHKEY) so no network topology lives in the manifest.
            - name: TS_ROUTES
              valueFrom:
                secretKeyRef:
                  name: headscale
                  key: TS_ROUTES
            - name: TS_HOSTNAME
              value: "homelab-subnet-router"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_ACCEPT_DNS
              value: "false"
            - name: TS_STATE_DIR
              value: "/var/lib/tailscale"
            # Disable the k8s-Secret state backend (which needs RBAC); persist
            # node identity to TS_STATE_DIR on the PVC instead.
            - name: TS_KUBE_SECRET
              value: ""
            # Talos ships nftables, not the legacy iptables kernel modules, so
            # tailscale's default legacy-iptables firewall fails to program the
            # subnet-route SNAT/forward rules. Force nftables (same lesson as
            # wg-easy).
            - name: TS_DEBUG_FIREWALL_MODE
              value: "nftables"
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - mountPath: /var/lib/tailscale
              name: state
            - mountPath: /dev/net/tun
              name: tun
            - mountPath: /lib/modules
              name: host-modules
              readOnly: true
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: headscale-router-state-claim
        - name: tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: host-modules
          hostPath:
            path: /lib/modules
            type: Directory
