apiVersion: longhorn.io/v1beta2
kind: Volume
metadata:
  name: knotdns-data
  namespace: longhorn-system
  labels:
    app: knotdns
spec:
  size: "1073741824"
  numberOfReplicas: 3
  frontend: blockdev
  accessMode: rwo
  dataEngine: v2
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: knotdns-data
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: longhorn
  csi:
    driver: driver.longhorn.io
    volumeHandle: knotdns-data
    fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: knotdns-data
  namespace: knotdns
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  volumeName: knotdns-data
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knotdns
  namespace: knotdns
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: knotdns
  template:
    metadata:
      labels:
        app: knotdns
    spec:
      # Pin to v2-data-engine-capable nodes (3 amd64 CP + 2 RK1). v2 volumes can only
      # attach where a v2 instance-manager runs; CM4s are fenced from v2 (and SD-only
      # CM4s have no Longhorn CSI). storage.longhorn-v2 is set on the 5 v2 nodes.
      nodeSelector:
        storage.longhorn-v2: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 53
        runAsGroup: 53
        fsGroup: 53
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-storage
          image: busybox
          command: ["sh", "-c", "cp -p /data/knot.conf /config; cp -p /data/*.zone /storage"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: storage
              mountPath: /storage
            - name: init-storage-data
              mountPath: /data
            - name: config
              mountPath: /config
      containers:
        - name: knotdns
          image: docker.io/cznic/knot:v3.5.6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 48Mi
              cpu: 100m
            limits:
              memory: 128Mi
              cpu: 200m
          args:
            - "/sbin/knotd"
          ports:
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
          livenessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
            - name: storage
              mountPath: /storage
      volumes:
        - name: config
          emptyDir: {}
        - name: storage
          persistentVolumeClaim:
            claimName: knotdns-data
        - name: init-storage-data
          secret:
            secretName: knotdns-init-storage
---
apiVersion: v1

kind: Service
metadata:
  name: knotdns-udp
  namespace: knotdns
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.3.2
    metallb.universe.tf/allow-shared-ip: knotdns
spec:
  selector:
    app: knotdns
  ports:
    - name: dns-udp
      protocol: UDP
      port: 53
      targetPort: 53
  type: LoadBalancer
---
apiVersion: v1

kind: Service
metadata:
  name: knotdns-tcp
  namespace: knotdns
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.3.2
    metallb.universe.tf/allow-shared-ip: knotdns
spec:
  selector:
    app: knotdns
  ports:
    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: 53
  type: LoadBalancer
