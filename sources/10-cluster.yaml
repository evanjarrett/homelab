apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: gateway-api-repo
  namespace: flux-system
spec:
  interval: 10m
  url: oci://ghcr.io/kubernetes-sigs/gateway-api/gateway-api-standard-install
  ref:
    semver: "1.5.x"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 10m
  path: ./
  prune: true
  sourceRef:
    kind: OCIRepository
    name: gateway-api-repo
  timeout: 5m0s
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: node-feature-discovery-repo
  namespace: flux-system
spec:
  interval: 10m
  url: https://github.com/kubernetes-sigs/node-feature-discovery.git
  ref:
    tag: v0.18.3
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: node-feature-discovery-crds
  namespace: flux-system
spec:
  interval: 10m
  path: ./deployment/overlays/default
  prune: true
  sourceRef:
    kind: GitRepository
    name: node-feature-discovery-repo
  timeout: 5m0s
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: kubelet-serving-cert-approver-repo
  namespace: flux-system
spec:
  interval: 10m
  url: https://github.com/alex1989hu/kubelet-serving-cert-approver.git
  ref:
    tag: v0.10.3
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubelet-serving-cert-approver
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy/standalone
  prune: true
  sourceRef:
    kind: GitRepository
    name: kubelet-serving-cert-approver-repo
  timeout: 5m0s
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: loom-repo
  namespace: flux-system
spec:
  interval: 5m
  url: https://tangled.org/evan.jarrett.net/loom.git
  ref:
    branch: main
