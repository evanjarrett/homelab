---
# Piraeus snapshot-controller: the cluster-wide CSI external-snapshotter
# (controller + VolumeSnapshot CRDs). Required for CSI VolumeSnapshots, which
# the app-data backup jobs use to clone Longhorn v2 volumes read-only. Not
# bundled by Longhorn (it ships only the csi-snapshotter sidecar).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: piraeus-helmrepo
  namespace: flux-system
spec:
  url: https://piraeus.io/helm-charts/
  interval: 2h
